services:
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./vw-data:/data
    networks:
      - vw-net
    # Image ships its own HEALTHCHECK (/healthcheck.sh) — no override needed.

  caddy:
    image: caddy:2-alpine
    container_name: vw-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data
      - ./caddy-config:/config
      - ./logs/caddy:/var/log/caddy
    environment:
      - DOMAIN=${DOMAIN:-http://localhost}
    networks:
      - vw-net
    depends_on:
      - vaultwarden

networks:
  vw-net:
    driver: bridge
