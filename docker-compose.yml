services:
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./vw-data:/data
    networks:
      - vw-net
    # Image ships its own HEALTHCHECK (/healthcheck.sh) — no override needed.

  caddy:
    image: caddy:2-alpine
    container_name: vw-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data
      - ./caddy-config:/config
      - ./logs/caddy:/var/log/caddy
    environment:
      - DOMAIN=${DOMAIN:-http://localhost}
    networks:
      - vw-net
    depends_on:
      - vaultwarden

  backup:
    build:
      context: .
      dockerfile: scripts/Dockerfile.backup
    container_name: vw-backup
    restart: unless-stopped
    environment:
      - REPO_DIR=${PWD}
      - TZ=UTC
    volumes:
      # Repo mounted at the SAME absolute path as on the host — required so the
      # drill's docker-out-of-docker volume mounts resolve on the host engine.
      - ${PWD}:${PWD}
      # Host Docker engine access for the drill's scratch container.
      # Trade-off: the socket is root-equivalent on the host; this sidecar runs
      # only our pinned image + this repo's script. Documented in the runbook.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist `rclone config` (run it once via: docker compose exec backup rclone config)
      - ./rclone-config:/root/.config/rclone
    working_dir: ${PWD}
    networks:
      - vw-net

  litestream:
    image: litestream/litestream:0.3.13
    container_name: vw-litestream
    restart: unless-stopped
    command: replicate
    volumes:
      - ./vw-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
      - ./backups/litestream:/replica
    # env_file: .env   # enable for S3: LITESTREAM_ACCESS_KEY_ID / LITESTREAM_SECRET_ACCESS_KEY
    depends_on:
      - vaultwarden
    networks:
      - vw-net

networks:
  vw-net:
    driver: bridge
